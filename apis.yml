apis:
- aid: newcastle-permanent:newcastle-permanent-cds-banking-products-api
  name: Newcastle Permanent Building Society CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.newcastlepermanent.com.au/
  baseURL: https://openbank.newcastlepermanent.com.au/cds-au/v1/banking/products
  properties:
  - url: https://developer.newcastlepermanent.com.au/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/newcastle-permanent-products-openapi.json
    type: OpenAPI
  - url: openapi/newcastle-permanent-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Live, public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data (PRD) API exposing Newcastle Permanent's banking product catalogue (term deposits,
    savings, transaction accounts, home loans, credit cards and more) under the standard
    Consumer Data Standards path /cds-au/v1/banking/products. Confirmed live with an HTTP
    200 JSON response carrying a data.products array, an x-v response version header, and
    x-fapi-interaction-id, currently serving 41 products at endpoint version x-v 4. The
    wired products OpenAPI is the bank's own export harvested verbatim from its developer
    portal (apiId 16, "Products"); the sibling cds-banking OpenAPI is the shared DSB
    Consumer Data Standards Banking API v1.36.0 for the full family surface.
- aid: newcastle-permanent:newcastle-permanent-cdr-accounts-balances-api
  name: Newcastle Permanent Building Society CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.newcastlepermanent.com.au/
  baseURL: https://openbank-secure.newcastlepermanent.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://developer.newcastlepermanent.com.au/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-accounts
    type: APIReference
  - url: openapi/newcastle-permanent-customer-data-openapi.json
    type: OpenAPI
  - url: openapi/newcastle-permanent-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right (CDR) Banking API surface for
    retrieving a consented customer's accounts and balances, covering Get Accounts, Get
    Bulk Balances, Get Account Balance and Get Account Detail under the Consumer Data
    Standards paths /cds-au/v1/banking/accounts, /banking/accounts/balances and
    /banking/accounts/{accountId}/balance. Unlike the public Product Reference Data API,
    these endpoints require an accredited data recipient (ADR) acting under an active
    CDR consent and are served over Newcastle Permanent's secured open-banking host
    (openbank-secure), so they are not callable anonymously. The wired OpenAPI is the
    bank's own portal export (apiId 17, "Customer Data") plus the shared DSB Consumer
    Data Standards Banking API v1.36.0.
