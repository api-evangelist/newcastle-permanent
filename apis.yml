    retrieving a consented customer's transaction history, covering Get Transactions For
    Account and Get Transaction Detail under the Consumer Data Standards paths
    /cds-au/v1/banking/accounts/{accountId}/transactions and
    /banking/accounts/{accountId}/transactions/{transactionId}. These endpoints require
    an accredited data recipient operating under an active CDR consent and are served
    over Newcastle Permanent's secured open-banking host (openbank-secure); they are not
    callable anonymously. Backed by the bank's own portal Customer Data export (apiId 17)
    and the shared DSB Consumer Data Standards Banking API v1.36.0.
