apis:
- aid: newcastle-permanent:newcastle-permanent-cds-banking-products-api
  name: Newcastle Permanent Building Society CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Australia
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.newcastlepermanent.com.au/
  baseURL: https://openbank.newcastlepermanent.com.au/cds-au/v1/banking/products
  properties:
  - url: https://developer.newcastlepermanent.com.au/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/newcastle-permanent-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Live, public, unauthenticated Consumer Data Right (CDR) Product Reference
    Data (PRD) API exposing Newcastle Permanent's banking product catalogue (term deposits,
    savings, transaction accounts, home loans, credit cards and more) under the standard
    Consumer Data Standards path /cds-au/v1/banking/products. Confirmed live with an HTTP
    200 JSON response carrying a data.products array, an x-v response version header, and
    x-fapi-interaction-id, currently serving 41 products at endpoint version x-v 4.
