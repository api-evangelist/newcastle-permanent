name: Newcastle Permanent Building Society
kind: company
description: Newcastle Permanent Building Society is a customer-owned Australian authorised
  deposit-taking institution (ADI) founded in 1903 and headquartered in Newcastle, New
  South Wales. As a mutual, it is owned by its members rather than shareholders, and it
  provides retail banking, home loans, savings, term deposits, and insurance to communities
  across NSW. In March 2023 it merged with Greater Bank to form Newcastle Greater Mutual
  Group (NGM Group), one of Australia's largest customer-owned banks, while Newcastle
  Permanent continues to operate as a consumer brand. As a regulated ADI it is a data
  holder under Australia's Consumer Data Right (CDR / Open Banking) and exposes a live,
  public, unauthenticated Product Reference Data (PRD) API conforming to the Data Standards
  Body Consumer Data Standards, alongside an NPBS Innovation Sandbox and Marketplace
  developer portal.
