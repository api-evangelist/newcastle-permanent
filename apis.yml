    retrieving the consented customer's own identity and contact details, covering Get
    Customer and Get Customer Detail under the Consumer Data Standards paths
    /cds-au/v1/common/customer and /common/customer/detail. These endpoints are
    documented in Newcastle Permanent's own developer-portal "Customer Data" product
    (apiId 17) export, require an accredited data recipient acting under an active CDR
