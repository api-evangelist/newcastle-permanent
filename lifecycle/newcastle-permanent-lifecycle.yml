deprecation:
  model: cds-obsolete-versions
  detail: >-
    The CDS versioning regime supersedes prior endpoint versions and publishes
    "obsolete versions" of each endpoint (the products spec links obsolete v1-v4).
    A future-effective / obsolescence window (effectiveFrom / effectiveTo and the
    `effective` filter) lets products be introduced or retired without a payload
    delete. Version retirement is announced through the DSB standards maintenance
    and change-management process.
