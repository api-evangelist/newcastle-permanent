    BankingScheduledPaymentRecurrence:
      required:
      - recurrenceUType
      type: object
      properties:
        nextPaymentDate:
          type: string
          description: The date of the next payment under the recurrence schedule
          x-cds-type: DateString
        recurrenceUType:
          type: string
          description: The type of recurrence used to define the schedule
          enum:
          - onceOff
          - intervalSchedule
          - lastWeekDay
          - eventBased
        onceOff:
