components:
  schemas:
    BankingTransactionDetail_extendedData_nppPayload:
      required:
      - extendedDescription
      - service
      - serviceVersion
      type: object
      properties:
        extendedDescription:
          type: string
          description: An extended string description. Only present if specified by the extensionUType field
        endToEndId:
          type: string
          description: An end to end ID for the payment created at initiation
        purposeCode:
          type: string
          description: Purpose of the payment. Format is defined by the NPP standards for the NPP overlay services including Osko (X2P1)
        service:
          type: string
          description: Identifier of the applicable overlay service. The service is used in conjunction with the serviceVersion.
          enum:
          - X2P1
          - IFTI
          - BSCT
          - CATSCT
        serviceVersion:
          type: string
          description: Two-digit NPP service overlay version with leading zero.
    BankingProductCategory:
      type: string
      description: The category to which a product or account belongs. See [here](https://consumerdatastandardsaustralia.github.io/standards/#product-categories) for more details
      enum:
      - TRANS_AND_SAVINGS_ACCOUNTS
      - TERM_DEPOSITS
      - TRAVEL_CARDS
      - REGULATED_TRUST_ACCOUNTS
      - RESIDENTIAL_MORTGAGES
      - CRED_AND_CHRG_CARDS
      - PERS_LOANS
      - MARGIN_LOANS
      - LEASES
      - TRADE_FINANCE
      - OVERDRAFTS
      - BUSINESS_LOANS
    ResponseErrorList:
      required:
      - errors
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ResponseErrorList_errors'
    BankingTransactionDetail_extendedDataV2:
      type: object
      properties:
        payer:
          type: string
          description: Label of the originating payer. Mandatory for inbound payment
        payee:
          type: string
          description: Label of the target PayID.  Mandatory for an outbound payment. The name assigned to the BSB/Account Number or PayID (by the owner of the PayID)
        extensionUType:
          type: string
          description: Optional extended data provided specific to transaction originated via NPP
          enum:
          - nppPayload
        nppPayload:
          $ref: '#/components/schemas/BankingTransactionDetail_extendedData_nppPayload'
    BankingProductFeature:
      required:
      - featureType
      type: object
      properties:
        featureType:
          type: string
          description: The type of feature described
          enum:
          - CARD_ACCESS
          - ADDITIONAL_CARDS
          - UNLIMITED_TXNS
          - FREE_TXNS
          - FREE_TXNS_ALLOWANCE
          - LOYALTY_PROGRAM
          - OFFSET
          - OVERDRAFT
          - REDRAW
          - INSURANCE
          - BALANCE_TRANSFERS
          - INTEREST_FREE
          - INTEREST_FREE_TRANSFERS
          - DIGITAL_WALLET
          - DIGITAL_BANKING
          - NPP_PAYID
          - NPP_ENABLED
          - DONATE_INTEREST
          - BILL_PAYMENT
          - COMPLEMENTARY_PRODUCT_DISCOUNTS
          - BONUS_REWARDS
          - NOTIFICATIONS
          - OTHER
        additionalValue:
          type: string
          description: Generic field containing additional information relevant to the [featureType](https://consumerdatastandardsaustralia.github.io/standards/#tocSproductfeaturetypedoc) specified. Whether mandatory or not is dependent on the value of the [featureType.](https://consumerdatastandardsaustralia.github.io/standards/#tocSproductfeaturetypedoc)
        additionalInfo:
          type: string
