                      enum:
                      - NEW_CUSTOMER
                      - RECURRING_DEPOSIT
                      - MIN_BALANCE
                      - MAX_BALANCE
                      - OTHER
              additionalInfo:
                type: string
              additionalInfoUri:
                type: string
                x-cds-type: URIString
      x-conditional:
      - additionalValue
    ResponseBankingTransactionList_data:
      required:
      - transactions
